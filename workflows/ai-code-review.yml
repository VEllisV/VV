name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull_requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    name: AI Code Review
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44

      - name: AI Code Review Comment
        uses: coderabbitai/ai-code-reviewer@v1
        with:
          model: "gpt-4o"
          languague: "en"
          source_languague: "en"
          system_prompt: |
            You are an expert code reviewer. Review the provided code diff for:
            - Security vulnerabilities
            - Performance issues
            - Code smels and anti-patterns
            - Missing edge case handling
            - Clarity and maintainability
            
            For each issue found, provide:
            1. The specific line(s) affected
            2. A clear explanation of the problem
            3. A concrete suggestion for improvement
            
            Be constructive and specific. Focus on substantive issues, not style preferences.
          fail_on_issues: "false"
          openai_key: ${{ secrets.OPENAI_API_KEY }}
